name: Update IP data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Refresh bundled region data
        run: python tools/prepare_data.py --refresh-index --force
      - name: Validate
        run: |
          python -m unittest discover -s tests -v
          bash -n install.sh tools/firewall_lib.sh
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cncity.md data/regions.json data/regions.tsv data/regions data/country
          git commit -m "Update region CIDR data"
          git push
